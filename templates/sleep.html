<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleep Sessions — Bullet Brain</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="page-wrapper">

<nav class="navbar">
  <div class="navbar-brand">
    <div class="brand-icon">🧠</div>
    Bullet Brain
  </div>
  <div class="navbar-right">
    <a href="{{ url_for('enter') }}" class="back-btn">← Back</a>
  </div>
</nav>

<main class="container">
  <div class="page-header">
    <div class="session-badge badge-sleep">🌙 Sleep</div>
    <h1>Sleep Sessions</h1>
    <p>Delta waves, white noise, and soothing soundscapes for deep, restful sleep</p>
  </div>
  <div class="sessions-grid">
    {% for s in sessions %}
    <div class="session-card">
      <div class="session-card-header">
        <h3 class="session-card-title">{{ s.title }}</h3>
        <span class="session-duration">{{ s.duration }}</span>
      </div>
      <p class="session-description">{{ s.description }}</p>
      <div class="audio-wrapper">
        <audio controls preload="none">
          <source src="{{ url_for('static', filename='audio/' + s.file) }}" type="audio/mpeg">
        </audio>
        <p class="no-audio-msg">Place <code>{{ s.file }}</code> in <code>static/audio/</code> to enable playback.</p>
      </div>
    </div>
    {% endfor %}
  </div>
</main>
</body>
</html>
